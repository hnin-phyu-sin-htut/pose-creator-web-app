spring.application.name=pose-creator-web-app
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/pose_db?sslmode=prefer
spring.datasource.username=pose
spring.datasource.password=pose
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# JWT
app.jwt.secret=m2yDfjt5I38howkC+NKQS3Nft4MetRK7cYqNqmSdmABuRhjBsk/qDLCmSBWShZ7kQ874zPTs0nSNC9hJix7UMg==
app.jwt.expiration-ms=86400000

# AI service
app.ai.service-url=http://localhost:8008
app.ai.timeout-seconds=180

# File uploads
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.hpsh.demo=INFO
logging.level.org.springframework.security=WARN
